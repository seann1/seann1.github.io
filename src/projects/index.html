            <project-item
                title="Winter Light Festival 2026"
                subtitle="Portland, OR"
                tags="TouchDesigner, webcam, real-time particle system, audio-reactive geometry, rear projection"
                description="Installed in the storefront windows of the historic Galleria building at SW 10th and Alder during Portland's Winter Light Festival 2026, this interactive work transformed passersby into pixelated, luminous figures projected across a large rear-projection surface visible from the street. A webcam mounted to the building's exterior captured pedestrians in real time, rendering their forms as colorful particle geometry using TouchDesigner's particle operators (POPs). The geometry responded dynamically to ambient audio — sound amplitude driving Perlin noise deformation across the mesh, so the figures breathed and pulsed with the surrounding soundscape. Viewers encountering their own transformed image in the window from the street experienced the work as both a mirror and a disruption — recognizable but abstracted, present but pixelated."
                pictures='["/images/projects/WLF-2026/WLF-1.jpg", {"type":"youtube","id":"I-EhOmxteSA"}, {"type":"short","id":"fdRsK8X1--o"}, {"type":"short","id":"tMWHOOSBPIA"}, "/images/projects/WLF-2026/WLF-2.jpg", "/images/projects/WLF-2026/WLF-3.jpg"]'
            ></project-item>
            <project-item
                title="NextNW Creative &amp; Marketing Networking Event"
                subtitle="Portland, OR — March 2026"
                tags="TouchDesigner, Orbbec Femto Bolt depth cameras (×2), real-time point cloud, particle system, dual projection"
                description="A dual-projection interactive installation created for NextNW's creative and marketing networking event at i9FX's Portland office. Using two Orbbec depth cameras and two independent TouchDesigner systems, the work occupied both levels of the venue's loft space simultaneously. On the main floor, a depth camera mounted on the loft captured the crowd below and projected their collective point cloud onto the wall above them in real time — the entire room rendered as luminous, pixelated figures overhead. Upstairs in the loft, a second and more intimate projection was visible only to those who made their way up: a depth camera captured individual silhouettes and generated a dynamic particle system from their form, producing explosive, colorful figures that dissolved and reformed with each person's movement."
                pictures='["/images/projects/NextNW/NextNW-1.jpg", "/images/projects/NextNW/NextNW-2.jpg", {"type":"short","id":"LrrrD4Mpwwc"}, "/images/projects/NextNW/NextNW-3.jpg"]'
            ></project-item>
            <project-item
                title="Hey Love PDX — Website Redesign"
                subtitle="Portland, OR — June 2026"
                tags="Squarespace, Photoshop, Illustrator, brand system, web design"
                description="A team project completed through Creat8ive Club, a Portland design program, redesigning heylovepdx.com to align with a brand refresh for Hey Love — the bar and restaurant inside the Jupiter NEXT Hotel serving Machetes' Mexico City street food. My contributions included implementing the new homepage hero video, bringing the site's design system into alignment with the updated brand palette (replacing the previous blue-teal with a warm yellow/gold across every page), and recoloring existing image and graphic assets in Photoshop to match. I also designed original background graphics in Photoshop and Illustrator, adapting motifs taken directly from the bar's physical rugs — tying the digital brand back to the physical space. All changes were implemented directly in Squarespace, working within its CMS and block constraints."
                pictures-before='["/images/projects/HeyLove/before/screenshot-1784586968019-0.jpg", "/images/projects/HeyLove/before/screenshot-1784587015948-1.jpg", "/images/projects/HeyLove/before/brunch-menu.png"]'
                pictures-after='["/images/projects/HeyLove/after/hero-2.png", "/images/projects/HeyLove/after/screenshot-1784588066784-3.jpg", "/images/projects/HeyLove/after/screenshot-1784588076278-4.jpg", "/images/projects/HeyLove/after/late-night-menu.png", "/images/projects/HeyLove/after/pattern-1.png"]'
            ></project-item>
